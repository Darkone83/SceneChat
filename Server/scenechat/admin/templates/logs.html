{% extends 'base.html' %}
{% block content %}
<h1 class="page-title">Server Log</h1>

<div class="card" style="padding:0;">
    <!-- Controls -->
    <div style="display:flex; gap:8px; padding:12px 16px; border-bottom:1px solid #222; align-items:center; flex-wrap:wrap;">

        <!-- Level filter buttons -->
        <div style="display:flex; gap:4px;">
            <button onclick="setLevel('ALL')"     id="btn-ALL"     class="lvl-btn active">ALL</button>
            <button onclick="setLevel('ERROR')"   id="btn-ERROR"   class="lvl-btn">ERROR</button>
            <button onclick="setLevel('WARNING')" id="btn-WARNING" class="lvl-btn">WARN</button>
            <button onclick="setLevel('INFO')"    id="btn-INFO"    class="lvl-btn">INFO</button>
            <button onclick="setLevel('DEBUG')"   id="btn-DEBUG"   class="lvl-btn">DEBUG</button>
        </div>

        <!-- Text search -->
        <input id="filter-input" type="text" placeholder="Search text..."
               style="flex:1; min-width:160px;" oninput="applyFilter()">

        <!-- Line count -->
        <select id="lines-select" onchange="fetchLogs()"
                style="background:#1a1a1a; border:1px solid #333; color:#eee;
                       padding:7px 10px; border-radius:4px; font-size:0.85em;">
            <option value="100">Last 100 lines</option>
            <option value="200" selected>Last 200 lines</option>
            <option value="500">Last 500 lines</option>
            <option value="1000">Last 1000 lines</option>
        </select>

        <!-- Auto-refresh -->
        <label style="color:#555; font-size:0.85em; display:flex; align-items:center; gap:6px; cursor:pointer;">
            <input type="checkbox" id="auto-refresh" checked onchange="toggleAutoRefresh()">
            Auto-refresh
        </label>

        <button onclick="fetchLogs()" class="btn btn-green" style="padding:6px 14px;">Refresh</button>
    </div>

    <!-- Log output -->
    <div id="log-container" style="position:relative;">
        <pre id="log-output"
             style="margin:0; padding:12px 16px; font-size:0.78em; line-height:1.6;
                    background:#0d0d0d; max-height:70vh; overflow-y:auto;
                    white-space:pre-wrap; word-break:break-all;"></pre>
        <div id="log-loading" style="position:absolute; top:12px; right:20px;
             color:#555; font-size:0.8em; display:none;">Loading...</div>
    </div>

    <!-- Stats bar -->
    <div style="padding:6px 16px; border-top:1px solid #222; display:flex; gap:16px;">
        <span id="stat-total"    style="font-size:0.78em; color:#555;">0 lines</span>
        <span id="stat-errors"   style="font-size:0.78em; color:#ff4444;">0 errors</span>
        <span id="stat-warnings" style="font-size:0.78em; color:#ffaa00;">0 warnings</span>
        <span id="stat-visible"  style="font-size:0.78em; color:#39ff14;">0 visible</span>
    </div>
</div>

<style>
.lvl-btn {
    padding: 5px 10px;
    border: 1px solid #333;
    border-radius: 4px;
    background: #1a1a1a;
    color: #777;
    cursor: pointer;
    font-size: 0.78em;
    font-weight: bold;
    transition: all 0.15s;
}
.lvl-btn:hover  { border-color:#555; color:#bbb; }
.lvl-btn.active { background:#222; border-color:#39ff14; color:#39ff14; }
.log-error      { color: #ff4444; }
.log-warning    { color: #ffaa00; }
.log-info       { color: #cccccc; }
.log-debug      { color: #555555; }
.log-match      { background: #1a2a1a; }
</style>

<script>
let _allLines     = [];
let _level        = 'ALL';
let _refreshTimer = null;

function setLevel(level) {
    _level = level;
    document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + level).classList.add('active');
    applyFilter();
}

function levelOf(line) {
    if (line.includes(' ERROR    ') || line.includes(' ERROR '))   return 'ERROR';
    if (line.includes(' WARNING  ') || line.includes(' WARNING ')) return 'WARNING';
    if (line.includes(' DEBUG    ') || line.includes(' DEBUG '))   return 'DEBUG';
    return 'INFO';
}

function colorClass(line) {
    const lv = levelOf(line);
    if (lv === 'ERROR')   return 'log-error';
    if (lv === 'WARNING') return 'log-warning';
    if (lv === 'DEBUG')   return 'log-debug';
    return 'log-info';
}

function applyFilter() {
    const search = document.getElementById('filter-input').value.toLowerCase();
    const out    = document.getElementById('log-output');
    let html     = '';
    let visible  = 0, errors = 0, warnings = 0;

    for (const line of _allLines) {
        const lv = levelOf(line);
        if (lv === 'ERROR')   errors++;
        if (lv === 'WARNING') warnings++;
        if (_level !== 'ALL' && lv !== _level) continue;
        if (search && !line.toLowerCase().includes(search)) continue;
        const cls   = colorClass(line);
        const extra = (search && line.toLowerCase().includes(search)) ? ' log-match' : '';
        const safe  = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        html += `<span class="${cls}${extra}">${safe}</span>\n`;
        visible++;
    }

    out.innerHTML = html;
    document.getElementById('stat-total').textContent    = `${_allLines.length} lines`;
    document.getElementById('stat-errors').textContent   = `${errors} errors`;
    document.getElementById('stat-warnings').textContent = `${warnings} warnings`;
    document.getElementById('stat-visible').textContent  = `${visible} visible`;

    // Always scroll to bottom (latest entry)
    out.scrollTop = out.scrollHeight;
}

function fetchLogs() {
    const lines = document.getElementById('lines-select').value;
    document.getElementById('log-loading').style.display = 'block';
    fetch(`/api/logs?lines=${lines}`)
        .then(r => r.json())
        .then(data => { _allLines = data.lines || []; applyFilter(); })
        .catch(e => console.error('Log fetch:', e))
        .finally(() => { document.getElementById('log-loading').style.display = 'none'; });
}

function toggleAutoRefresh() {
    if (document.getElementById('auto-refresh').checked) {
        _refreshTimer = setInterval(fetchLogs, 3000);
    } else {
        clearInterval(_refreshTimer);
        _refreshTimer = null;
    }
}

fetchLogs();
_refreshTimer = setInterval(fetchLogs, 3000);
</script>
{% endblock %}
