{% extends 'base.html' %}
{% block content %}
<h1 class="page-title">Chat Monitor</h1>
<div class="card" style="padding: 0;">
    <div style="display: flex; border-bottom: 1px solid #222;">
        {% for room in rooms %}
        <button
            class="room-tab {% if loop.first %}active{% endif %}"
            onclick="switchRoom({{ room[0] }}, this)"
            data-room="{{ room[0] }}">
            {% if room[2] == 'voice' %}??{% else %}#{% endif %}{{ room[1] }}
        </button>
        {% endfor %}
    </div>
    <div id="message-feed" style="
        height: 440px;
        overflow-y: auto;
        padding: 16px;
        font-family: monospace;
        font-size: 0.85em;
    "></div>

    <!-- Admin send bar -->
    <div style="display:flex; gap:8px; padding:10px 12px; border-top:1px solid #222; align-items:center;">
        <input id="admin-input" type="text" placeholder="Send as [Admin]..."
               style="flex:1; background:#111; border:1px solid #333; color:#eee;
                      padding:7px 10px; border-radius:4px; font-size:0.85em;"
               onkeydown="if(event.key==='Enter') sendAdminMessage()">
        <button onclick="toggleEmojiPicker()"
                style="background:#1a1a1a; border:1px solid #333; color:#aaa;
                       padding:7px 10px; border-radius:4px; cursor:pointer; font-size:0.85em;">
            ??
        </button>
        <button onclick="sendAdminMessage()"
                style="background:#39ff14; border:none; color:#000; font-weight:bold;
                       padding:7px 14px; border-radius:4px; cursor:pointer; font-size:0.85em;">
            Send
        </button>
    </div>

    <!-- Emoji picker -->
    <div id="emoji-picker" style="display:none; padding:10px 12px; border-top:1px solid #111;
                                   flex-wrap:wrap; gap:4px; max-height:120px; overflow-y:auto;">
        {% for name in emoji_names %}
        <img src="/emoji/{{ name }}.png"
             title=":{{ name }}:"
             onclick="insertEmoji(':{{ name }}:')"
             style="width:24px; height:24px; cursor:pointer; border-radius:3px;
                    border:1px solid transparent; image-rendering:pixelated;"
             onmouseover="this.style.borderColor='#39ff14'"
             onmouseout="this.style.borderColor='transparent'">
        {% endfor %}
    </div>
</div>

<style>
    .room-tab {
        background: none; border: none; color: #555;
        padding: 12px 16px; cursor: pointer; font-size: 0.85em;
        border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .room-tab:hover { color: #aaa; }
    .room-tab.active { color: #39ff14; border-bottom-color: #39ff14; }
    .msg-line {
        padding: 4px 0; border-bottom: 1px solid #0a0a0a;
        display: flex; gap: 12px; align-items: flex-start;
    }
    .msg-line:hover { background: #0d0d0d; }
    .msg-time  { color: #333; min-width: 70px; }
    .msg-user  { color: #8b5cf6; min-width: 120px; font-weight: bold; }
    .msg-user.admin { color: #39ff14; }
    .msg-content { color: #ccc; flex: 1; word-break: break-word; }
    .msg-content img { width:18px; height:18px; vertical-align:middle;
                       image-rendering:pixelated; margin:0 1px; }
    .msg-deleted { color: #333; font-style: italic; }
    .msg-delete-btn {
        background: none; border: 1px solid #333; color: #555;
        padding: 2px 6px; border-radius: 3px; cursor: pointer;
        font-size: 0.75em; transition: all 0.2s;
    }
    .msg-delete-btn:hover { border-color: #dc2626; color: #dc2626; }
    #send-status { font-size:0.75em; color:#555; padding:0 12px 6px; }
</style>

<div id="send-status"></div>

<script>
    let currentRoom = {{ rooms[0][0] if rooms else 0 }};
    let currentRoomId = currentRoom;
    let lastMessageId = 0;
    let pollInterval = null;
    let emojiPickerOpen = false;

    // -- Emoji rendering ------------------------------------------------------
    function renderContent(text) {
        // Escape HTML first, then replace :token: with <img> tags
        const escaped = escapeHtml(text);
        return escaped.replace(/:([a-zA-Z0-9_]+):/g, function(match, name) {
            return `<img src="/emoji/${name}.png" title="${match}"
                        onerror="this.outerHTML=':${name}:'"
                        style="width:18px;height:18px;vertical-align:middle;
                               image-rendering:pixelated;margin:0 1px;">`;
        });
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(text));
        return d.innerHTML;
    }

    // -- Message rendering -----------------------------------------------------
    function appendMessage(msg) {
        const feed = document.getElementById('message-feed');
        const div  = document.createElement('div');
        div.className = 'msg-line';
        div.id = `msg-${msg.id}`;

        const isAdmin = msg.username === '[Admin]';

        if (msg.deleted) {
            div.innerHTML = `
                <span class="msg-time">${msg.timestamp}</span>
                <span class="msg-user ${isAdmin ? 'admin' : ''}">${escapeHtml(msg.username)}</span>
                <span class="msg-deleted">[deleted]</span>`;
        } else {
            div.innerHTML = `
                <span class="msg-time">${msg.timestamp}</span>
                <span class="msg-user ${isAdmin ? 'admin' : ''}">${escapeHtml(msg.username)}</span>
                <span class="msg-content">${renderContent(msg.content)}</span>
                <button class="msg-delete-btn" onclick="deleteMessage(${msg.id})">Del</button>`;
        }

        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
    }

    // -- Polling ---------------------------------------------------------------
    async function pollMessages() {
        try {
            const res = await fetch(`/api/messages/${currentRoom}?since=${lastMessageId}`);
            const messages = await res.json();
            for (const msg of messages) {
                appendMessage(msg);
                if (msg.id > lastMessageId) lastMessageId = msg.id;
            }
        } catch(e) {
            console.error('Poll error:', e);
        }
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollMessages();
        pollInterval = setInterval(pollMessages, 2000);
    }

    function switchRoom(roomId, btn) {
        document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        currentRoom = roomId;
        lastMessageId = 0;
        document.getElementById('message-feed').innerHTML = '';
        startPolling();
    }

    // -- Delete ----------------------------------------------------------------
    async function deleteMessage(msgId) {
        const res  = await fetch(`/messages/delete/${msgId}`);
        const data = await res.json();
        if (data.status === 'ok') {
            const el = document.getElementById(`msg-${msgId}`);
            if (el) {
                el.querySelector('.msg-content')?.remove();
                el.querySelector('.msg-delete-btn')?.remove();
                const d = document.createElement('span');
                d.className = 'msg-deleted';
                d.textContent = '[deleted]';
                el.appendChild(d);
            }
        }
    }

    // -- Admin send ------------------------------------------------------------
    async function sendAdminMessage() {
        const input   = document.getElementById('admin-input');
        const content = input.value.trim();
        const status  = document.getElementById('send-status');
        if (!content) return;

        const form = new FormData();
        form.append('room_id', currentRoom);
        form.append('content', content);

        try {
            const res  = await fetch('/api/send_message', { method: 'POST', body: form });
            const data = await res.json();
            if (data.ok) {
                input.value = '';
                status.style.color = '#39ff14';
                status.textContent = `? ${data.msg}`;
            } else {
                status.style.color = '#dc2626';
                status.textContent = `? ${data.msg}`;
            }
        } catch(e) {
            status.style.color = '#dc2626';
            status.textContent = `? ${e}`;
        }
        setTimeout(() => status.textContent = '', 3000);
    }

    // -- Emoji picker ----------------------------------------------------------
    function toggleEmojiPicker() {
        emojiPickerOpen = !emojiPickerOpen;
        document.getElementById('emoji-picker').style.display =
            emojiPickerOpen ? 'flex' : 'none';
    }

    function insertEmoji(token) {
        const input = document.getElementById('admin-input');
        input.value += token;
        input.focus();
    }

    startPolling();
</script>
{% endblock %}
